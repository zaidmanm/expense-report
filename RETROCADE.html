<style>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;display:flex;align-items:center;justify-content:center;width:100%;height:100dvh;overflow:hidden;font-family:'Press Start 2P',monospace;user-select:none;touch-action:none;}
.bezel{width:100%;height:100%;max-width:960px;background:linear-gradient(155deg,#2d2d2d,#1d1d1d,#252525);border-radius:clamp(4px,2vw,22px);padding:clamp(6px,1.8vw,18px);box-shadow:0 0 0 2px #3c3c3c,0 16px 70px #000,inset 0 1px 0 rgba(255,255,255,.08);display:flex;flex-direction:column;gap:4px;}
.brand{text-align:center;font-size:clamp(5px,1vw,9px);color:#ff5500;letter-spacing:clamp(1px,.6vw,5px);text-shadow:0 0 14px rgba(255,85,0,.7);flex-shrink:0;padding:2px 0;}
.screen-wrap{flex:1;position:relative;border-radius:clamp(4px,1.5vw,14px);overflow:hidden;background:#000;box-shadow:inset 0 0 80px rgba(0,0,0,.95),0 0 35px rgba(51,255,51,.12);}
.screen-wrap::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:50;background:repeating-linear-gradient(180deg,transparent 0,transparent 3px,rgba(0,0,0,.09) 3px,rgba(0,0,0,.09) 4px);border-radius:inherit;}
.screen-wrap::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:51;background:radial-gradient(ellipse 85% 85% at 50% 50%,transparent 35%,rgba(0,0,0,.6) 100%);border-radius:inherit;}
canvas{display:block;width:100%;height:100%;cursor:none;}
#overlay{position:absolute;inset:0;z-index:60;display:none;align-items:center;justify-content:center;background:rgba(0,7,0,.96);}
#overlay.show{display:flex;}
.menu-wrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:clamp(10px,3vw,28px) clamp(8px,2vw,20px);gap:clamp(8px,1.8vw,14px);overflow-y:auto;}
.logo{color:#33ff33;font-size:clamp(14px,4vw,30px);text-shadow:0 0 20px #33ff33,0 0 50px rgba(51,255,51,.35);animation:flk 6s infinite;letter-spacing:2px;}
@keyframes flk{0%,94%,100%{opacity:1}95%{opacity:.6}96%{opacity:1}97%{opacity:.4}98%{opacity:1}}
.sub{color:#1a6a1a;font-size:clamp(5px,1.1vw,8px);letter-spacing:3px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(clamp(115px,18vw,155px),1fr));gap:clamp(6px,1.2vw,11px);width:100%;max-width:780px;}
.cart{background:linear-gradient(145deg,#0d280d,#091509);border:1.5px solid #1d5a1d;border-radius:7px;padding:clamp(10px,2vw,17px) 8px;text-align:center;cursor:pointer;transition:all .12s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.cart:hover,.cart:focus-visible{border-color:#33ff33;background:linear-gradient(145deg,#183818,#0d2a0d);box-shadow:0 0 22px rgba(51,255,51,.3);transform:translateY(-2px);outline:none;}
.cart:active{transform:scale(.96);}
.ci{font-size:clamp(20px,4vw,29px);display:block;margin-bottom:7px;}
.cn{color:#33ff33;font-size:clamp(5px,1.1vw,8px);line-height:1.9;display:block;}
.ch{color:#1a6a1a;font-size:clamp(4px,.9vw,7px);margin-top:5px;display:block;}
.mft{color:#1a5a1a;font-size:clamp(4px,.9vw,7px);text-align:center;line-height:2.3;margin-top:auto;}
.hmodal{background:#000c00;border:2px solid #33ff33;border-radius:9px;padding:clamp(14px,3vw,26px);max-width:480px;width:90%;max-height:85%;overflow-y:auto;box-shadow:0 0 60px rgba(51,255,51,.2);}
.hmodal h2{color:#aaffaa;font-size:clamp(8px,2vw,12px);margin-bottom:14px;text-shadow:0 0 10px #33ff33;}
.hmodal h3{color:#ffb000;font-size:clamp(6px,1.4vw,9px);margin:13px 0 5px;}
.hmodal p{color:#33ff33;font-size:clamp(5px,1.1vw,8px);line-height:2.3;margin-bottom:4px;}
.hcls{margin-top:16px;background:#1a3a1a;border:1.5px solid #33ff33;color:#33ff33;font-family:'Press Start 2P',monospace;font-size:clamp(5px,1.1vw,8px);padding:11px 20px;cursor:pointer;border-radius:5px;width:100%;transition:all .12s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.hcls:hover{background:#253a25;box-shadow:0 0 12px rgba(51,255,51,.25);}
.gowrap{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;gap:clamp(10px,2.5vw,20px);}
.got{color:#ff2222;font-size:clamp(15px,5vw,38px);text-shadow:0 0 30px #ff0000;animation:flk 2s infinite;}
.gosc{color:#33ff33;font-size:clamp(9px,2.5vw,17px);}
.gobt{color:#1a6a1a;font-size:clamp(7px,2vw,12px);}
.gohs{color:#ffb000;font-size:clamp(7px,2vw,11px);text-shadow:0 0 10px #ffb000;animation:pg 1s infinite;}
@keyframes pg{0%,100%{opacity:1}50%{opacity:.35}}
.brow{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:4px;}
.cbtn{background:#1a3a1a;border:1.5px solid #33ff33;color:#33ff33;font-family:'Press Start 2P',monospace;font-size:clamp(5px,1.1vw,9px);padding:clamp(7px,1.5vw,11px) clamp(10px,2vw,17px);cursor:pointer;border-radius:5px;transition:all .12s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.cbtn:hover{background:#253a25;box-shadow:0 0 14px rgba(51,255,51,.3);}
.ctrl-row{display:flex;justify-content:center;gap:clamp(4px,1.5vw,14px);flex-shrink:1;flex-wrap:wrap;min-height:0;overflow:hidden;max-height:28px;}
.pill{background:#171717;border:1px solid #282828;border-radius:20px;padding:3px 9px;color:#555;font-size:clamp(4px,.85vw,7px);}
#hbtn{position:absolute;top:8px;right:8px;z-index:55;background:rgba(0,18,0,.85);border:1px solid #1d5a1d;color:#1a6a1a;font-family:'Press Start 2P',monospace;font-size:clamp(5px,.9vw,7px);padding:5px 9px;cursor:pointer;border-radius:3px;display:none;transition:all .12s;}
#hbtn.show{display:block;}
#hbtn:hover{border-color:#33ff33;color:#33ff33;}
#mbtn{position:absolute;top:8px;left:8px;z-index:55;background:rgba(0,18,0,.85);border:1px solid #1d5a1d;color:#1a6a1a;font-family:'Press Start 2P',monospace;font-size:clamp(5px,.9vw,7px);padding:5px 9px;cursor:pointer;border-radius:3px;display:none;transition:all .12s;}
#mbtn.show{display:block;}
#mbtn:hover{border-color:#33ff33;color:#33ff33;}
#mbtn.muted{border-color:#555;color:#555;}
</style>
</head>
<body>
<div id="upd-banner" onclick="applyUpdate()">⬆ UPDATE AVAILABLE — TAP TO INSTALL ⬆</div>
<div class="bezel">
  <div class="brand">★ RETROCADE HOME ENTERTAINMENT SYSTEM ★</div>
  <div class="screen-wrap" id="sw">
    <canvas id="gc"></canvas>
    <button id="hbtn" onclick="openHelp()">? HELP</button>
    <button id="mbtn" onclick="MUSIC.toggle()">🎵 BGM</button>
    <div id="overlay"></div>
  </div>
  <div class="ctrl-row">
    <div class="pill">🖱 MOUSE = CONTROL</div>
    <div class="pill">CLICK = FIRE / ACTION</div>
    <div class="pill">ESC = MENU</div>
  </div>
</div>
<script>
/* PWA — apple-touch-icon (generated) + SW registration */
(function(){
  // Generate apple touch icon via canvas (works without a PNG file)
  try{
    const ic=document.createElement('canvas');ic.width=ic.height=512;
    const x=ic.getContext('2d');
    x.fillStyle='#001100';x.fillRect(0,0,512,512);
    x.shadowColor='#33ff33';x.shadowBlur=30;x.fillStyle='#33ff33';
    x.font='bold 190px monospace';x.textAlign='center';x.textBaseline='middle';x.fillText('RC',256,256);
    const al=document.createElement('link');al.rel='apple-touch-icon';al.href=ic.toDataURL();
    document.head.appendChild(al);
  }catch(e){}

  // Register the real sw.js — enables offline play + update pushes
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').then(reg=>{
      // Poll for updates every 60 seconds (catches deploys while app is open)
      setInterval(()=>reg.update(),60000);
      // Listen for a new SW installing
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        nw.addEventListener('statechange',()=>{
          if(nw.state==='installed'&&navigator.serviceWorker.controller){
            // New version is ready — show the banner
            document.getElementById('upd-banner').classList.add('show');
          }
        });
      });
    }).catch(e=>console.warn('SW reg failed:',e));

    // When the new SW takes control, reload to apply the update
    let reloading=false;
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      if(!reloading){reloading=true;location.reload();}
    });
  }
})();

function applyUpdate(){
  document.getElementById('upd-banner').classList.remove('show');
  if(navigator.serviceWorker.controller)
    navigator.serviceWorker.controller.postMessage('skipWaiting');
}

/* ENGINE */
const gc=document.getElementById('gc'),ctx=gc.getContext('2d');
const OV=document.getElementById('overlay'),HB=document.getElementById('hbtn'),SW=document.getElementById('sw');
let W=0,H=0,mouse={x:0,y:0,down:false,clicked:false};
let appState='menu',curGame=null,curId=null,helpPaused=false;

function resize(){const r=SW.getBoundingClientRect();W=gc.width=Math.floor(r.width);H=gc.height=Math.floor(r.height);if(curGame&&curGame.resize)curGame.resize(W,H);}
window.addEventListener('resize',()=>{resize();if(appState==='menu')drawBg();});

SW.addEventListener('mousemove',e=>{const r=gc.getBoundingClientRect();mouse.x=(e.clientX-r.left)*(W/r.width);mouse.y=(e.clientY-r.top)*(H/r.height);});
SW.addEventListener('mousedown',e=>{if(e.button===0){mouse.down=true;mouse.clicked=true;}});
SW.addEventListener('mouseup',e=>{if(e.button===0)mouse.down=false;});
SW.addEventListener('contextmenu',e=>e.preventDefault());
SW.addEventListener('touchstart',e=>{
  // Only intercept if touching the canvas during gameplay — let overlay buttons work normally
  if(e.target!==gc)return;
  e.preventDefault();
  mouse.down=true;mouse.clicked=true;
  const t=e.touches[0],r=gc.getBoundingClientRect();
  mouse.x=(t.clientX-r.left)*(W/r.width);mouse.y=(t.clientY-r.top)*(H/r.height);
},{passive:false});
SW.addEventListener('touchmove',e=>{
  if(e.target!==gc)return;
  e.preventDefault();
  const t=e.touches[0],r=gc.getBoundingClientRect();
  mouse.x=(t.clientX-r.left)*(W/r.width);mouse.y=(t.clientY-r.top)*(H/r.height);
},{passive:false});
SW.addEventListener('touchend',e=>{
  if(e.target!==gc)return;
  e.preventDefault();mouse.down=false;
},{passive:false});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&appState==='game')showMenu();if((e.key===' '||e.key==='Enter')&&appState==='game')mouse.clicked=true;});

/* AUDIO */
let AC;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended'){try{AC.resume();}catch(e){}}return AC;}
function beep(f,d,type,v){type=type||'square';v=v||0.07;try{const a=getAC(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=type;o.frequency.setValueAtTime(f,a.currentTime);o.frequency.exponentialRampToValueAtTime(Math.max(f*.4,20),a.currentTime+d);g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);o.start();o.stop(a.currentTime+d+.01);}catch(e){}}
var SFX={shoot:function(){beep(700,.07,'square',.07);},hit:function(){beep(160,.12,'sawtooth',.09);},score:function(){beep(440,.08);setTimeout(function(){beep(660,.08);},90);},die:function(){beep(80,.5,'sawtooth',.12);},bounce:function(){beep(520,.04,'square',.05);},ding:function(){[440,550,660,880].forEach(function(f,i){setTimeout(function(){beep(f,.1);},i*70);});}};

/* HIGH SCORES */
var HS={get:function(id){try{return+localStorage.getItem('rcade_'+id)||0;}catch(e){return 0;}},save:function(id,s){try{var p=HS.get(id);if(s>p){localStorage.setItem('rcade_'+id,s);return true;}return false;}catch(e){return false;}}};

/* DRAW HELPERS */
function cls(c){ctx.fillStyle=c||'#000800';ctx.fillRect(0,0,W,H);}
function txt(t,x,y,sz,c,align){ctx.save();ctx.font=(sz||10)+"px 'Press Start 2P',monospace";ctx.fillStyle=c||'#33ff33';ctx.textAlign=align||'left';ctx.textBaseline='middle';ctx.shadowColor=c||'#33ff33';ctx.shadowBlur=5;ctx.fillText(t,x,y);ctx.restore();}
function cur(x,y){ctx.save();ctx.strokeStyle='rgba(51,255,51,.9)';ctx.lineWidth=1.5;ctx.shadowColor='#33ff33';ctx.shadowBlur=9;var s=8;ctx.beginPath();ctx.moveTo(x-s,y);ctx.lineTo(x+s,y);ctx.moveTo(x,y-s);ctx.lineTo(x,y+s);ctx.stroke();ctx.restore();}

/* ══ GAME 1: SQUASH ══════════════════════════════════════════════════ */
var SQUASH={id:'squash',name:'SQUASH',icon:'🏓',
  help:{title:'SQUASH',controls:'Move mouse UP / DOWN to control your paddle on the left side.',objective:'Rally the ball against the CPU. Score 10 pts each time it misses. Lose a life when YOU miss. 3 lives total.',
    tips:['Ball speeds up every rally — it gets fast!','Edge of paddle = sharp angle','Aim for CPU corners to score','CPU gets faster each point you score']},
  init:function(w,h){this.W=w;this.H=h;this.score=0;this.lives=3;this.pH=h*.18;this.pW=10;this.pY=h/2;this.cY=h/2;this.bX=w/2;this.bY=h/2;this.bVX=4*(Math.random()>.5?1:-1);this.bVY=(Math.random()*2-1)*3;this.bR=6;this.cpuSpd=2.1;this.trail=[];this.flash=0;},
  resize:function(w,h){this.init(w,h);},
  resetBall:function(){this.bX=this.W/2;this.bY=this.H/2;var s=Math.min(4+this.score*.015,9);this.bVX=s*(Math.random()>.5?1:-1);this.bVY=(Math.random()*2-1)*3.5;this.trail=[];},
  update:function(){
    this.pY=Math.max(this.pH/2,Math.min(this.H-this.pH/2,mouse.y));
    var cd=this.bY-this.cY;this.cY+=Math.sign(cd)*Math.min(Math.abs(cd),this.cpuSpd);this.cY=Math.max(this.pH/2,Math.min(this.H-this.pH/2,this.cY));
    this.trail.push({x:this.bX,y:this.bY});if(this.trail.length>10)this.trail.shift();
    this.bX+=this.bVX;this.bY+=this.bVY;
    if(this.bY<this.bR){this.bY=this.bR;this.bVY*=-1;SFX.bounce();}
    if(this.bY>this.H-this.bR){this.bY=this.H-this.bR;this.bVY*=-1;SFX.bounce();}
    var ppx=22+this.pW;
    if(this.bX-this.bR<ppx&&this.bVX<0&&this.bY>this.pY-this.pH/2&&this.bY<this.pY+this.pH/2){
      this.bX=ppx+this.bR;var rel=(this.bY-this.pY)/(this.pH/2);this.bVX=Math.abs(this.bVX)*1.07;this.bVY=rel*6.5;SFX.bounce();this.flash=7;}
    var cpx=this.W-22-this.pW;
    if(this.bX+this.bR>cpx&&this.bVX>0&&this.bY>this.cY-this.pH/2&&this.bY<this.cY+this.pH/2){
      this.bX=cpx-this.bR;var rel2=(this.bY-this.cY)/(this.pH/2);this.bVX=-Math.abs(this.bVX)*1.07;this.bVY=rel2*6.5;SFX.bounce();}
    var spd=Math.sqrt(this.bVX*this.bVX+this.bVY*this.bVY);if(spd>13){this.bVX*=13/spd;this.bVY*=13/spd;}
    if(this.bX<0){this.lives--;SFX.die();if(this.lives<=0)return'gameover';this.resetBall();}
    if(this.bX>this.W){this.score+=10;SFX.score();this.cpuSpd=Math.min(this.cpuSpd+.28,6.5);this.resetBall();}
    if(this.flash>0)this.flash--;},
  draw:function(){
    cls('#000a04');ctx.setLineDash([8,8]);ctx.strokeStyle='#0a3010';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
    var self=this;this.trail.forEach(function(p,i){ctx.fillStyle='rgba(51,255,51,'+(i/self.trail.length*.22)+')';ctx.beginPath();ctx.arc(p.x,p.y,self.bR*.65,0,Math.PI*2);ctx.fill();});
    var bc=this.flash>0?'#ccffcc':'#33ff33';ctx.fillStyle=bc;ctx.shadowColor=bc;ctx.shadowBlur=18;ctx.beginPath();ctx.arc(this.bX,this.bY,this.bR,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='#aaffaa';ctx.shadowColor='#33ff33';ctx.shadowBlur=12;ctx.fillRect(22,this.pY-this.pH/2,this.pW,this.pH);
    ctx.fillStyle='#ff6644';ctx.shadowColor='#ff6644';ctx.fillRect(this.W-22-this.pW,this.cY-this.pH/2,this.pW,this.pH);ctx.shadowBlur=0;
    txt(String(this.score).padStart(4,'0'),W*.25,14,10,'#33ff33','center');
    txt('♥'.repeat(this.lives),W/2,14,10,'#ff4444','center');
    txt('CPU',W*.75,14,10,'#ff6644','center');
    cur(mouse.x,mouse.y);}
};

/* ══ GAME 2: SPACE INVADERS ══════════════════════════════════════════ */
var INVADERS={id:'invaders',name:'SPACE INVADERS',icon:'👾',
  help:{title:'SPACE INVADERS',controls:'Move mouse LEFT/RIGHT to aim. LEFT CLICK to shoot.',objective:'Destroy all aliens before they reach the bottom. They speed up as numbers drop!',
    tips:['Rapid click = rapid fire (slight cooldown)','Higher alien rows = more points','Dodge the bombs they drop','Wave clear = 500 × wave number bonus']},
  init:function(w,h){this.W=w;this.H=h;this.score=0;this.lives=3;this.wave=1;this.sx=w/2;this.sW=28;this.sH=16;this.bullets=[];this.bombs=[];this.exps=[];this.cd=0;this.bTimer=0;this.animT=0;this.moveT=0;this.iDir=1;this.buildWave();},
  resize:function(w,h){this.init(w,h);},
  buildWave:function(){
    this.inv=[];
    // Scale invader grid to always fit inside the screen width
    var cols=10,rows=4;
    var maxW=this.W-20;
    var iW=Math.min(22,Math.floor((maxW-(cols-1)*10)/cols));
    var iH=Math.floor(iW*.75);
    var gX=Math.min(12,Math.floor((maxW-cols*iW)/(cols-1)));
    var gY=Math.max(10,gX);
    var tw=cols*(iW+gX)-gX,x0=Math.floor((this.W-tw)/2);
    for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)
      this.inv.push({x:x0+c*(iW+gX),y:38+r*(iH+gY),w:iW,h:iH,alive:true,type:r===0?2:r<3?1:0,fr:0,iW:iW,iH:iH,gX:gX});},
  update:function(){
    this.sx=Math.max(this.sW/2,Math.min(this.W-this.sW/2,mouse.x));
    if(mouse.clicked&&this.cd<=0){this.bullets.push({x:this.sx,y:this.H-42,vy:-9});SFX.shoot();this.cd=13;}
    if(this.cd>0)this.cd--;
    this.bullets=this.bullets.filter(function(b){b.y+=b.vy;return b.y>0;});
    this.animT++;if(this.animT>22){this.animT=0;this.inv.forEach(function(v){if(v.alive)v.fr^=1;});}
    var alive=this.inv.filter(function(v){return v.alive;});
    if(alive.length===0){SFX.ding();this.score+=500*this.wave;this.wave++;this.buildWave();}
    var self=this;
    var spMult=1+(1-alive.length/40)*2.8;
    this.moveT+=(0.28+this.wave*.14)*spMult;
    if(this.moveT>=1){
      this.moveT=0;var wall=false;var iDir=this.iDir;
      alive.forEach(function(v){if(iDir>0&&v.x+v.w>self.W-8)wall=true;if(iDir<0&&v.x<8)wall=true;});
      if(wall){this.iDir*=-1;alive.forEach(function(v){v.y+=13;});SFX.bounce();}
      else{var step=self.iDir;alive.forEach(function(v){v.x+=step*3;});}
    }
    this.bTimer++;var bRate=Math.max(22,92-this.wave*9);
    if(this.bTimer>=bRate&&alive.length>0){this.bTimer=0;var sh=alive[Math.floor(Math.random()*alive.length)];this.bombs.push({x:sh.x+sh.w/2,y:sh.y+sh.h,vy:3.5+this.wave*.55});}
    var pY=this.H-38;
    this.bombs=this.bombs.filter(function(b){b.y+=b.vy;if(b.y>pY-8&&b.y<pY+self.sH&&Math.abs(b.x-self.sx)<self.sW){self.lives--;SFX.die();self.exps.push({x:self.sx,y:pY,r:0,a:1});return false;}return b.y<self.H;});

  moveThing:function(thing,spd,ghost){

  // A* ghost pathfinding (simplified: pick direction closest to target)

  muted:(function(){try{return localStorage.getItem('rcade_muted')==='1';}catch(e){return false;}}()),
  active:null,timers:[],step:0,

  ac:function(){var a=getAC();if(a.state==='suspended'){try{a.resume();}catch(e){}}return a;},

  sched:function(fn,ms){var t=setTimeout(fn,ms);this.timers.push(t);return t;},

  stop:function(){this.timers.forEach(function(t){clearTimeout(t);});this.timers=[];this.active=null;this.step=0;},

  toggle:function(){
    this.muted=!this.muted;
    try{localStorage.setItem('rcade_muted',this.muted?'1':'0');}catch(e){}
    if(!this.muted&&curId){var id=curId;this.active=null;this.step=0;this.play(id);}
    this.updateBtn();},

  updateBtn:function(){
    var b=document.getElementById('mbtn');if(!b)return;
    b.textContent=this.muted?'🔕 BGM OFF':'🎵 BGM ON';
    b.style.color=this.muted?'#555':'#1a6a1a';
    b.style.borderColor=this.muted?'#444':'#1d5a1d';},

  // Low-level: schedule one oscillator note
  osc:function(freq,when,dur,type,vol,slide){
    if(this.muted)return;
    try{
      var a=this.ac(),o=a.createOscillator(),g=a.createGain();
      o.connect(g);g.connect(a.destination);
      o.type=type;o.frequency.setValueAtTime(freq,when);
      if(slide)o.frequency.linearRampToValueAtTime(slide,when+dur*.9);
      g.gain.setValueAtTime(vol,when);
      g.gain.setValueAtTime(vol,when+dur*.75);
      g.gain.linearRampToValueAtTime(0.0001,when+dur);
      o.start(when);o.stop(when+dur+0.01);
    }catch(e){}},

  play:function(id){
    this.stop();this.active=id;this.updateBtn();
    if(this.muted)return;
    var self=this;
    setTimeout(function(){
      if(self.active!==id)return;
      try{self.ac();}catch(e){}
      if(id==='pacman')self.playPacman();
      else if(id==='invaders')self.playInvaders();
      else if(id==='race')self.playRace();
      else if(id==='squash')self.playSquash();
      else if(id==='breakout')self.playBreakout();
      else if(id==='asteroids')self.playAsteroids();
    },150);},

  /* ── PAC-MAN ─────────────────────────────────────────────────────
     The exact Pac-Man beginning jingle, note-perfect.
     Frequencies sourced from the original Namco Z80 ROM data.
     After jingle: wee-woo siren loop (the in-game chase music).   */
  playPacman:function(){
    var self=this;if(this.muted||this.active!=='pacman')return;
    // [freq_hz, duration_sec]  — 0 = rest
    var J=[
      [494,.12],[494,.12],[370,.12],[311,.12],[494,.09],[370,.24],
      [554,.12],[523,.12],[494,.12],[466,.12],[494,.09],[330,.24],[0,.09],
      [494,.12],[494,.12],[370,.12],[311,.12],[494,.09],[370,.15],
      [370,.09],[392,.10],[415,.10],[440,.10],[466,.10],[494,.40]];
    try{
      var a=this.ac(),t=a.currentTime+0.06;
      J.forEach(function(n){
        if(n[0]>0)self.osc(n[0],t,n[1]*.88,'square',.13);
        t+=n[1];
      });
      self.sched(function(){if(self.active==='pacman')self.pacSiren();},
                 Math.ceil((t-(a.currentTime+0.06))*1000)+100);
    }catch(e){}},

  pacSiren:function(){
    var self=this;if(this.muted||this.active!=='pacman')return;
    // Iconic wee-woo: two sweeping tones
    try{
      var a=this.ac(),now=a.currentTime;
      self.osc(440,now,.36,'square',.08,880);   // wee (rise)
      self.osc(880,now+.36,.36,'square',.08,440); // woo (fall)
    }catch(e){}
    self.sched(function(){if(self.active==='pacman')self.pacSiren();},740);},

  /* ── SPACE INVADERS ──────────────────────────────────────────────
     The authentic 4-step sawtooth march from Taito's 8080 code.
     Real steps: ~160 Hz → ~100 Hz → ~130 Hz → ~100 Hz, each a
     percussive blip. Tempo accelerates as invaders are killed.    */
  playInvaders:function(){
    var self=this;if(this.muted||this.active!=='invaders')return;
    // Exact pitch ratios from the original hardware timer values
    var FREQS=[160,100,130,100];
    var alive=curGame&&curGame.inv?curGame.inv.filter(function(v){return v.alive;}).length:40;
    var ms=Math.max(60,Math.min(460,50+alive*10));
    try{
      var a=this.ac(),now=a.currentTime;
      var f=FREQS[this.step%4];this.step++;
      // Percussive square blip — short attack, hard cutoff
      self.osc(f,now,ms/1000*.55,'square',.15);
    }catch(e){}
    self.sched(function(){if(self.active==='invaders')self.playInvaders();},ms);},

  /* ── SPEED RACE / POLE POSITION ─────────────────────────────────
     Sawtooth engine drone with rising pitch and a crowd-noise
     shimmer, mimicking Atari's analog engine sound.              */
  playRace:function(){
    var self=this;if(this.muted||this.active!=='race')return;
    var spd=curGame?curGame.spd:3;
    var base=48+spd*13;
    var ms=Math.max(38,110-spd*6);
    try{
      var a=this.ac(),now=a.currentTime;
      self.osc(base,now,ms/1000,'sawtooth',.11,base*1.12);
      self.osc(base*1.5,now,ms/1000*.45,'square',.028);
    }catch(e){}
    self.sched(function(){if(self.active==='race')self.playRace();},curGame?Math.max(38,110-curGame.spd*6):85);},

  /* ── SQUASH / PONG ───────────────────────────────────────────────
     Classic Pong had no music, so we use a chill arpeggio in the
     style of early Atari — triangle + octave square.            */
  playSquash:function(){
    var self=this;if(this.muted||this.active!=='squash')return;
    var ARP=[131,165,196,220,262,294,262,220,196,165,131,110];
    try{
      var a=this.ac(),now=a.currentTime,freq=ARP[this.step%ARP.length];this.step++;
      self.osc(freq,now,.18,'triangle',.08);
      self.osc(freq*2,now,.11,'square',.04);
    }catch(e){}
    self.sched(function(){if(self.active==='squash')self.playSquash();},210);},

  /* ── BREAKOUT / ARKANOID ─────────────────────────────────────────
     Arkanoid's upbeat synth arpeggio — major scale, square wave,
     tempo rises each level just like the original.              */
  playBreakout:function(){
    var self=this;if(this.muted||this.active!=='breakout')return;
    // C4 major pentatonic x2 octaves
    var SEQ=[262,330,392,523,659,523,392,330,294,370,440,587,440,370,294,247];
    var lvl=curGame?curGame.lvl:1;
    var ms=Math.max(95,260-lvl*14);
    try{
      var a=this.ac(),now=a.currentTime,freq=SEQ[this.step%SEQ.length];this.step++;
      self.osc(freq,now,ms/1000*.65,'square',.09);
      if(this.step%8===0)self.osc(freq*.5,now,ms/1000*1.3,'triangle',.07);
    }catch(e){}
    self.sched(function(){if(self.active==='breakout')self.playBreakout();},ms);},

  /* ── ASTEROIDS ───────────────────────────────────────────────────
     The exact two-tone da-DUM heartbeat from Atari's 6502 code.
     Real frequencies: ~55 Hz and ~41 Hz, pure sine, exponential
     decay. Tempo locks to the number of asteroids remaining.    */
  playAsteroids:function(){
    var self=this;if(this.muted||this.active!=='asteroids')return;
    var alive=curGame&&curGame.asts?curGame.asts.length:10;
    var ms=Math.max(100,Math.min(600,100+alive*20));
    try{
      var a=this.ac(),now=a.currentTime;
      var freq=this.step%2===0?55:41;this.step++;
      // Sine thump with hard exponential decay — authentic feel
      var o=a.createOscillator(),g=a.createGain();
      o.connect(g);g.connect(a.destination);o.type='sine';
      o.frequency.setValueAtTime(freq,now);
      g.gain.setValueAtTime(.25,now);
      g.gain.exponentialRampToValueAtTime(0.0001,now+(ms/1000)*.55);
      o.start(now);o.stop(now+(ms/1000)*.6);
    }catch(e){}
    self.sched(function(){if(self.active==='asteroids')self.playAsteroids();},ms);}
};

/* ══ GAME REGISTRY ═══════════════════════════════════════════════════ */
var GAMES=[SQUASH,INVADERS,RACE,BREAKOUT,ASTEROIDS,PACMAN];

/* ══ UI FUNCTIONS ════════════════════════════════════════════════════ */
function showMenu(){
  appState='menu';curGame=null;curId=null;helpPaused=false;
  HB.classList.remove('show');
  document.getElementById('mbtn').classList.remove('show');
  MUSIC.stop();
  OV.className='show';
  OV.innerHTML='<div class="menu-wrap"><div class="logo">★ RETROCADE ★</div><div class="sub">SELECT A CARTRIDGE</div><div class="grid">'+
    GAMES.map(function(g){return '<div class="cart" tabindex="0" onclick="startGame(\''+g.id+'\')" onkeydown="if(event.key===\'Enter\')startGame(\''+g.id+'\')"><span class="ci">'+g.icon+'</span><span class="cn">'+g.name+'</span><span class="ch">BEST: '+String(HS.get(g.id)).padStart(5,'0')+'</span></div>';}).join('')+
    '</div><div class="mft">MOUSE = CONTROL &nbsp;&nbsp; CLICK = FIRE / ACTION<br>ESC = RETURN TO MENU &nbsp;&nbsp; ? = HELP</div></div>';}

function startGame(id){
  var g=GAMES.filter(function(g){return g.id===id;})[0];if(!g)return;
  curGame=g;curId=id;appState='game';helpPaused=false;
  OV.className='';HB.classList.add('show');
  document.getElementById('mbtn').classList.add('show');
  MUSIC.updateBtn();
  resize();g.init(W,H);
  try{if(AC&&AC.state==='suspended')AC.resume();}catch(e){}
  MUSIC.play(id);}

function openHelp(){
  if(!curGame)return;helpPaused=true;var h=curGame.help;
  OV.className='show';
  OV.innerHTML='<div class="hmodal"><h2>📋 HOW TO PLAY: '+h.title+'</h2><h3>🎮 CONTROLS</h3><p>'+h.controls+'</p><h3>🎯 OBJECTIVE</h3><p>'+h.objective+'</p><h3>💡 TIPS</h3>'+h.tips.map(function(t){return '<p>→ '+t+'</p>';}).join('')+'<button class="hcls" onclick="closeHelp()">▶ RESUME GAME</button></div>';}

function closeHelp(){helpPaused=false;OV.className='';}

function showGameOver(score,isNew){
  MUSIC.stop();
  appState='gameover';HB.classList.remove('show');OV.className='show';
  OV.innerHTML='<div class="gowrap"><div class="got">GAME OVER</div>'+(isNew?'<div class="gohs">★ NEW HIGH SCORE! ★</div>':'')+
    '<div class="gosc">SCORE: '+String(score).padStart(5,'0')+'</div>'+
    '<div class="gobt">BEST:&nbsp; '+String(HS.get(curId)).padStart(5,'0')+'</div>'+
    '<div class="brow"><button class="cbtn" onclick="startGame(\''+curId+'\')">▶ PLAY AGAIN</button><button class="cbtn" onclick="showMenu()">⌂ MENU</button></div></div>';}

/* ══ BACKGROUND (shown in menu behind overlay) ═══════════════════════ */
function drawBg(){
  cls('#000800');var t=Date.now()/1000;
  ctx.fillStyle='rgba(51,255,51,0.018)';ctx.fillRect(0,(t*55)%H,W,3);
  txt('RETROCADE',W/2,H*.5,Math.min(W*.04,22),'#0a3a0a','center');}

/* ══ MAIN LOOP ════════════════════════════════════════════════════════ */
var lt=0;
function loop(ts){
  requestAnimationFrame(loop);var dt=Math.min(ts-lt,50)/16.67;lt=ts;
  if(appState==='game'&&curGame&&!helpPaused){
    var res=curGame.update(dt);curGame.draw();
    if(res==='gameover'){var isNew=HS.save(curId,curGame.score);showGameOver(curGame.score,isNew);}
  }else if(appState==='menu'){drawBg();}
  mouse.clicked=false;}

window.addEventListener('load',function(){resize();showMenu();requestAnimationFrame(loop);});
</script>
